services:
  var_www_html:
    image: serversideup/php:8.2-fpm-nginx-alpine
    ports:
      - "${APP_PORT-80}:8080"
    volumes:
      - ./:/var/www/html
    environment:
      PHP_MEMORY_LIMIT: "1024M"

  mariadb:
    image: mariadb:10.4
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_HOST: "${DB_HOST}"
      MYSQL_DATABASE: "${DB_DATABASE}"
      MYSQL_USER: "${DB_USERNAME}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"